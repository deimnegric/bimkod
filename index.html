<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Ürün Arama</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <style>
        /* Modern tasarım */
        body { background: #f0f2f5; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .app-container { background: #fff; width: 100%; max-width: 400px; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #image-to-crop { max-width: 100%; display: none; }
        .btn { width: 100%; padding: 15px; margin-top: 10px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; color: white; }
        #scan-btn { background: #28a745; display: none; }
        #camera-btn { background: #007bff; }
    </style>
</head>
<body>

<div class="app-container">
    <h2>Pro Arama Asistanı</h2>
    <button id="camera-btn" class="btn">📸 Fotoğraf Çek</button>
    <input type="file" id="file-input" accept="image/*" style="display:none">
    
    <div id="preview-area" style="margin-top:20px;">
        <img id="image-to-crop" alt="Ürün">
    </div>

    <button id="scan-btn" class="btn">🔍 Kırp ve Tara</button>
    <div id="status"></div>
</div>

<script>
    const image = document.getElementById('image-to-crop');
    let cropper;

    document.getElementById('camera-btn').onclick = () => document.getElementById('file-input').click();
    document.getElementById('file-input').onchange = (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
            image.src = e.target.result;
            image.style.display = 'block';
            if (cropper) cropper.destroy();
            cropper = new Cropper(image, { aspectRatio: NaN, viewMode: 1 });
            document.getElementById('scan-btn').style.display = 'block';
        };
        reader.readAsDataURL(file);
    };

    document.getElementById('scan-btn').onclick = () => {
        cropper.getCroppedCanvas().toBlob(async (blob) => {
            document.getElementById('status').innerText = "🚀 Analiz ediliyor...";
            const formData = new FormData();
            formData.append('file', blob);
            
            // Hugging Face Backend'e gönder
            const res = await fetch("https://deimnegric-bimkod.hf.space/vektor-uret", {
                method: "POST",
                body: formData
            });
            const data = await res.json();
            document.getElementById('status').innerText = "✅ Vektör üretildi: " + data.vector.slice(0,5) + "...";
            // Burada önceki arama mantığını (Firebase eşleşmesi) çağıracaksın
        });
    };
</script>
</body>
</html>
