    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: #fff; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 450px; text-align: center; }
        h2 { color: #1e293b; margin-bottom: 25px; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        button, label { width: 100%; padding: 15px; border: 1px solid #e2e8f0; border-radius: 12px; background: #fff; color: #334155; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; box-sizing: border-box; }
        button:hover, label:hover { background: #f8fafc; border-color: #cbd5e1; }
        input[type="file"] { display: none; }
        #preview-container { margin-top: 15px; border-radius: 15px; overflow: hidden; display: none; position: relative; border: 1px solid #e2e8f0; }
        img, video { width: 100%; height: auto; display: block; }
        #scan-btn, #capture-btn { display: none; margin-top: 15px; background: #10b981; color: #fff; width: 100%; border: none; font-size: 16px; padding: 15px; border-radius: 12px; }
        #capture-btn { background: #2563eb; }
        #status { margin-top: 15px; font-weight: 600; font-size: 14px; }
        .success { color: #16a34a; }
        .error { color: #dc2626; }
        .loading { color: #2563eb; }
        #result-container { margin-top: 20px; text-align: left; display: none; }
    </style>
    <script src="config.js"></script> 
<script>
    const HF_API_URL = "https://deimnegric-bimkod.hf.space/vektor-uret";
    const FIREBASE_URL = "https://bimkod-ced21-default-rtdb.europe-west1.firebasedatabase.app/vektorler.json";

    const cameraBtn = document.getElementById('camera-btn');
    const fileInput = document.getElementById('file-input');
    const video = document.getElementById('video');
    const imgPreview = document.getElementById('img-preview');
    const previewContainer = document.getElementById('preview-container');
    const captureBtn = document.getElementById('capture-btn');
    const scanBtn = document.getElementById('scan-btn');
    const statusDiv = document.getElementById('status');
    const telegramResult = document.getElementById('telegram-result');

    let stream = null;
    let selectedFile = null;

    // 1. Kamera Butonu (Canlı Kamera)
    cameraBtn.addEventListener('click', async () => {
        previewContainer.style.display = 'block';
        video.style.display = 'block';
        imgPreview.style.display = 'none';
        captureBtn.style.display = 'block'; // Çek butonu görünecek
        scanBtn.style.display = 'none';
        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;
        } catch (err) { alert("Kamera izni gerekli!"); }
    });

    // 2. Fotoğraf Çek Butonu
    captureBtn.addEventListener('click', () => {
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        canvas.toBlob((blob) => {
            selectedFile = new File([blob], "photo.jpg", { type: "image/jpeg" });
            imgPreview.src = URL.createObjectURL(blob);
            imgPreview.style.display = 'block';
            video.style.display = 'none';
            captureBtn.style.display = 'none';
            scanBtn.style.display = 'block'; // TARA BUTONU ARTIK GÖRÜNÜYOR
            if(stream) stream.getTracks().forEach(t => t.stop());
        }, 'image/jpeg');
    });

    // 3. Dosya Seçme
    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if(file) {
            selectedFile = file;
            imgPreview.src = URL.createObjectURL(file);
            imgPreview.style.display = 'block';
            video.style.display = 'none';
            captureBtn.style.display = 'none';
            scanBtn.style.display = 'block'; // TARA BUTONU ARTIK GÖRÜNÜYOR
            previewContainer.style.display = 'block';
        }
    });

    // 4. Tara Butonu
    scanBtn.addEventListener('click', async () => {
        scanBtn.style.display = 'none';
        statusDiv.innerHTML = "Analiz ediliyor...";
        const formData = new FormData(); formData.append("file", selectedFile);
        const res = await fetch(HF_API_URL, { method: "POST", body: formData });
        const data = await res.json();
        
        // Firebase arama kısmı buraya gelecek...
        // searchInFirebase(data.vectors[0]);
    });
</script>

</head>

        <label for="file-input">Galeriden Seç<br>🖼️</label>
        <input type="file" id="file-input" accept="image/*">
    </div>

    <div id="preview-container">
        <video id="video" autoplay playsinline></video>
        <img id="img-preview" alt="Önizleme">
    </div>

    <button id="capture-btn">📸 Çek</button>
    <button id="scan-btn">🔍 TARA VE BUL</button>

    <div id="status"></div>
    <div id="result-container">
        <div id="telegram-result"></div>
    </div>
</div>
