<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>BimKod Afiş Sistemi</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        const firebaseConfig = {
            databaseURL: "https://bimkod-ced21-default-rtdb.europe-west1.firebasedatabase.app/"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Veriyi çek ve butonlara bağla
        const verilerRef = ref(db, 'vektorler');
        onValue(verilerRef, (snapshot) => {
            const data = snapshot.val();
            const container = document.getElementById('afis-listesi');
            container.innerHTML = ""; // Önce temizle

            for (let id in data) {
                let item = data[id];
                // Telegram fotoğraf gösterme URL'si (Bot API formatı)
                let fotoUrl = `https://api.telegram.org/bot<TOKENIN>/getFile?file_id=${item.file_id}`;
                
                let div = document.createElement('div');
                div.innerHTML = `
                    <div class="afis-kart">
                        <img src="https://api.telegram.org/file/bot<TOKENIN>/${item.file_id}" alt="Afiş">
                        <p>ID: ${item.afis_id} | Tarih: ${item.tarih}</p>
                        <button onclick="kameraAc('${item.file_id}')">📷 Kamera</button>
                        <button onclick="galeriAc('${item.file_id}')">🖼 Galeri</button>
                    </div>
                `;
                container.appendChild(div);
            }
        });
    </script>
</head>
<body>
    <div id="afis-listesi"></div>

    <script>
        function kameraAc(fileId) {
            alert("Kamera açılıyor... Bağlı Afiş: " + fileId);
            // Burada kamera tetikleme kodların çalışacak
        }
        function galeriAc(fileId) {
            alert("Galeri açılıyor... Bağlı Afiş: " + fileId);
            // Burada galeri seçimi kodların çalışacak
        }
    </script>
</body>
</html>
