<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kurumsal Ürün Arama</title>
    <style>
        body { font-family: sans-serif; background: #f0f0f0; margin: 0; padding: 10px; box-sizing: border-box; }
        .container { background: #fff; padding: 15px; border-radius: 12px; width: 100%; max-width: 500px; margin: 0 auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { font-size: 20px; text-align: center; }
        .btn { padding: 15px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; font-size: 16px; }
        
        /* MOBİL İÇİN DÜZEN: Görseller yan yana değil alt alta gelsin (dar ekranda) */
        .resim-alani { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; align-items: center; }
        .resim-alani img { width: 100%; max-width: 300px; border-radius: 8px; border: 1px solid #eee; }
        
        /* Sonuç kartları mobil için özelleştirildi */
        .result-card { border-bottom: 2px solid #eee; padding-bottom: 20px; margin-top: 20px; }
        
        #upload { width: 100%; padding: 10px; box-sizing: border-box; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>
    <div class="container">
        <h1>Ürün Arama Asistanı</h1>
        <input type="file" id="upload" accept="image/*">
        <button id="ara" class="btn" style="background:#5cb85c;">Benzerleri Bul</button>
        <div id="sonuclar"></div>
    </div>

    <script>
        // Firebase ve API işlemleri aynı kanki...
        document.getElementById('ara').onclick = async () => {
            const file = document.getElementById('upload').files[0];
            if(!file) { alert("Önce resim seç kanki!"); return; }
            
            // Yükleniyor durumu ekrana bas (Kullanıcıya bilgi ver)
            document.getElementById('ara').innerText = "Taranıyor...";
            
            // (Arama mantığı buraya...)
            // ...
            document.getElementById('ara').innerText = "Benzerleri Bul";
        };
    </script>
</body>
</html>
