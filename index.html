<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ürün Arama Asistanı</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: #fff; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 450px; text-align: center; }
        h2 { color: #1e293b; margin-bottom: 25px; }
        .btn-group { display: flex; gap: 15px; margin-bottom: 20px; }
        button, label { flex: 1; padding: 12px; border: 1px solid #e2e8f0; border-radius: 12px; background: #fff; color: #334155; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; }
        button:hover, label:hover { background: #f8fafc; border-color: #cbd5e1; }
        input[type="file"] { display: none; }
        #preview-container { margin-top: 15px; border-radius: 15px; overflow: hidden; display: none; position: relative; border: 1px solid #e2e8f0; }
        img, video { width: 100%; height: auto; display: block; }
        #capture-btn { display: none; margin-top: 15px; background: #2563eb; color: #fff; width: 100%; border: none; }
        #capture-btn:hover { background: #1d4ed8; }
        #status { margin-top: 15px; font-weight: 600; font-size: 14px; }
        .success { color: #16a34a; }
        .error { color: #dc2626; }
        .loading { color: #2563eb; }
        #result-container { margin-top: 20px; text-align: left; display: none; }
        .telegram-widget { border: 1px solid #e2e8f0; border-radius: 12px; padding: 15px; background: #f8fafc; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Ürün Arama Asistanı</h2>
    
    <div class="btn-group">
        <button id="camera-btn">📷 Canlı Kamera</button>
        <label for="file-input">🖼️ Galeriden Seç</label>
        <input type="file" id="file-input" accept="image/*">
    </div>

    <div id="preview-container">
        <video id="video" autoplay playsinline></video>
        <img id="img-preview" alt="Önizleme">
    </div>

    <button id="capture-btn">🎯 Çek ve Ara</button>

    <div id="status"></div>

    <div id="result-container">
        <h4 style="margin: 0; color: #1e293b;">Eşleşen Sonuç:</h4>
        <div id="cropped-preview-title" style="font-size: 12px; color: #64748b; margin-top: 10px; display:none;">Aranan Ürün Bölgesi:</div>
        <img id="cropped-product-img" style="max-width: 120px; border-radius: 8px; margin-top: 5px; display:none; border: 2px solid #2563eb;">
        <div id="telegram-result" class="telegram-widget"></div>
    </div>
</div>

<script>
    const HF_API_URL = "https://deimnegric-bimkodyeni.hf.space/vektor-uret";
    const FIREBASE_URL = "https://bimkod-ced21-default-rtdb.europe-west1.firebasedatabase.app/vektorler.json";

    const cameraBtn = document.getElementById('camera-btn');
    const fileInput = document.getElementById('file-input');
    const video = document.getElementById('video');
    const imgPreview = document.getElementById('img-preview');
    const previewContainer = document.getElementById('preview-container');
    const captureBtn = document.getElementById('capture-btn');
    const statusDiv = document.getElementById('status');
    const resultContainer = document.getElementById('result-container');
    const telegramResult = document.getElementById('telegram-result');
    const croppedProductImg = document.getElementById('cropped-product-img');
    const croppedPreviewTitle = document.getElementById('cropped-preview-title');

    let stream = null;

    cameraBtn.addEventListener('click', async () => {
        imgPreview.style.display = 'none';
        video.style.display = 'block';
        previewContainer.style.display = 'block';
        captureBtn.style.display = 'block';
        resultContainer.style.display = 'none';
        statusDiv.innerHTML = '';
        
        if(stream) { stream.getTracks().forEach(track => track.stop()); }
        
        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
            video.srcObject = stream;
        } catch (err) {
            showStatus("Kameraya erişilemedi kanki!", "error");
        }
    });

    fileInput.addEventListener('change', (e) => {
        if(stream) { stream.getTracks().forEach(track => track.stop()); captureBtn.style.display = 'none'; }
        const file = e.target.files[0];
        if (file) {
            video.style.display = 'none';
            imgPreview.style.display = 'block';
            previewContainer.style.display = 'block';
            imgPreview.src = URL.createObjectURL(file);
            resultContainer.style.display = 'none';
            sendToPipeline(file);
        }
    });

    captureBtn.addEventListener('click', () => {
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        
        canvas.toBlob((blob) => {
            video.style.display = 'none';
            imgPreview.style.display = 'block';
            imgPreview.src = URL.createObjectURL(blob);
            captureBtn.style.display = 'none';
            if(stream) { stream.getTracks().forEach(track => track.stop()); }
            
            const file = new File([blob], "capture.jpg", { type: "image/jpeg" });
            sendToPipeline(file);
        }, 'image/jpeg');
    });

    function showStatus(msg, type) {
        statusDiv.className = type;
        statusDiv.innerHTML = msg;
    }

    function cosineSimilarity(vecA, vecB) {
        let dotProduct = 0.0;
        let normA = 0.0;
        let normB = 0.0;
        for (let i = 0; i < vecA.length; i++) {
            dotProduct += vecA[i] * vecB[i];
            normA += vecA[i] * vecA[i];
            normB += vecB[i] * vecB[i];
        }
        return dotProduct / (Math.sqrt(normA) * Math.sqrt(normB));
    }

    async function sendToPipeline(file) {
        showStatus("🔄 Ürün ayıklanıyor ve vektör üretiliyor...", "loading");
        
        const formData = new FormData();
        formData.append("file", file);

        try {
            const response = await fetch(HF_API_URL, { method: "POST", body: formData });
            const data = await response.json();

            if (data.status === "success" && data.vectors.length > 0) {
                showStatus("⚡ Vektör alındı, arşiv taranıyor...", "loading");
                searchInFirebase(data.vectors[0], file);
            } else {
                showStatus("❌ Görsel işlenemedi veya ürün tespit edilemedi.", "error");
            }
        } catch (err) {
            showStatus("Hata: " + err.message, "error");
        }
    }

    async function searchInFirebase(targetVector, originalFile) {
        try {
            const response = await fetch(FIREBASE_URL);
            const dbData = await response.json();

            if (!dbData) {
                showStatus("📭 Veritabanında kayıtlı afiş bulunamadı kanki.", "error");
                return;
            }

            let bestMatch = null;
            let highestScore = -1;

            for (const key in dbData) {
                const item = dbData[key];
                if (item.vektorler && Array.isArray(item.vektorler)) {
                    for (const vec of item.vektorler) {
                        const score = cosineSimilarity(targetVector, vec);
                        if (score > highestScore) {
                            highestScore = score;
                            bestMatch = item;
                        }
                    }
                }
            }

            if (highestScore > 0.65 && bestMatch) {
                showStatus(`✅ Ürün Bulundu! (Eşleşme: %${(highestScore * 100).toFixed(1)})`, "success");
                
                croppedPreviewTitle.style.display = 'block';
                croppedProductImg.style.display = 'block';
                croppedProductImg.src = imgPreview.src; 

                resultContainer.style.display = 'block';
                telegramResult.innerHTML = `
                    <strong>Afiş Kodu:</strong> ${bestMatch.afis_id}<br>
                    <small style="color:#64748b;">Veritabanı Kayıt No: ${bestMatch.tarih || 'Belirtilmemiş'}</small><br><br>
                    <a href="https://t.me/c/2458145229/${bestMatch.afis_id}" target="_blank" style="color: #2563eb; font-weight: bold; text-decoration: none;">
                    👉 Telegram'da Orijinal Afişi Gör
                    </a>
                `;
            } else {
                showStatus(`🔍 Yakın eşleşme bulunamadı. (En yüksek ihtimal: %${(highestScore * 100).toFixed(1)})`, "error");
            }

        } catch (err) {
            showStatus("Veritabanı hatası: " + err.message, "error");
        }
    }
</script>

</body>
</html>
