<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kurumsal Ürün Arama</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
            max-width: 600px; /* Görseller için alanı biraz genişlettik kanki */
            width: 100%;
            text-align: center;
            border-top: 5px solid #d9534f;
            margin-top: 20px;
        }
        header h1 {
            color: #333333;
            margin-bottom: 20px;
            font-size: 24px;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }
        
        .upload-btn, .trigger-btn {
            flex: 1;
            display: inline-block;
            color: white;
            padding: 12px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            border: none;
            transition: background-color 0.3s;
        }
        .camera-btn { background-color: #0275d8; }
        .camera-btn:hover { background-color: #025aa5; }
        .gallery-btn { background-color: #d9534f; }
        .gallery-btn:hover { background-color: #c9302c; }

        #camera-container {
            margin-top: 15px;
            position: relative;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
        }
        #webcam {
            width: 100%;
            height: auto;
            display: block;
        }
        .capture-action-btn {
            background-color: #5bc0de;
            color: white;
            margin: 10px 0;
        }

        #preview-container {
            margin-top: 10px;
        }
        #preview-container img {
            max-width: 100%;
            max-height: 250px;
            object-fit: contain;
            border: 2px dashed #cccccc;
            padding: 5px;
            border-radius: 8px;
        }
        .preview-hidden { display: none; }
        
        .action-btn, .reset-btn {
            margin-top: 15px;
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            transition: background-color 0.3s;
        }
        .action-btn { background-color: #5cb85c; color: white; }
        .action-btn:hover:not(:disabled) { background-color: #4cae4c; }
        .action-btn:disabled { background-color: #cccccc; cursor: not-allowed; }
        .reset-btn { background-color: #333333; color: white; }
        .reset-btn:hover { background-color: #222222; }
        
        #ai-status-message { 
            margin-top: 15px; 
            font-weight: bold; 
            font-size: 15px;
        }
        .status-loading { color: #f0ad4e; font-style: italic; }
        .status-success { color: #5cb85c; }
        .status-error { color: #d9534f; }

        .hidden { display: none; }
        
        #result-section { margin-top: 30px; border-top: 2px solid #eeeeee; padding-top: 20px; }
        .gallery-title { font-size: 16px; font-weight: bold; color: #333; margin-bottom: 15px; }
        .gallery { display: flex; flex-direction: column; gap: 25px; }
        
        .result-card {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: left;
            padding: 15px;
        }
        .image-preview-block {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin: 15px 0;
        }
        .image-box {
            flex: 1;
            min-width: 140px;
        }
        .image-box p {
            margin: 0 0 5px 0;
            font-size: 12px;
            font-weight: bold;
            color: #666;
        }
        .image-box img {
            max-width: 100%;
            height: auto;
            border-radius: 6px;
            border: 1px solid #eee;
        }
        .match-score {
            font-size: 18px;
            font-weight: bold;
            color: #5cb85c;
            margin-bottom: 8px;
        }
        .widget-wrapper {
            margin-top: 15px;
            background: #fdfdfd;
            border-radius: 6px;
            padding: 5px;
        }
    </style>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>

<div class="container">
    <header>
        <h1>Ürün Arama Asistanı</h1>
    </header>
    <main>
        
        <div class="button-group">
            <button id="start-camera-btn" class="trigger-btn camera-btn">📷 Kamerayı Aç</button>
            <label for="gallery-upload" class="upload-btn gallery-btn" style="text-align: center;">🖼️ Galeriden Seç</label>
            <input type="file" id="gallery-upload" accept="image/*" hidden>
        </div>

        <div id="camera-container" class="hidden">
            <video id="webcam" autoplay playsinline></video>
            <button id="capture-btn" class="trigger-btn capture-action-btn">📸 Fotoğrafı Çek</button>
        </div>
        
        <div id="preview-container" class="preview-hidden">
            <img id="image-preview" src="#" alt="Aranacak Ürün">
        </div>
        
        <canvas id="canvas" class="hidden"></canvas>
        
        <div id="ai-status-message" class="hidden"></div>
        
        <button id="search-btn" class="action-btn" disabled>Benzer Afişleri Bul</button>
        
        <div id="result-section" class="hidden">
            <div class="gallery-title">En Yakın 3 Eşleşme (Görsel ve Önizlemeli):</div>
            <div id="gallery-container" class="gallery"></div>
        </div>
        
        <button id="reset-btn" class="reset-btn">Yeni Arama Yap</button>
    </main>
</div>

<script>
    // ⚙️ Sizin Canlı Firebase Yapılandırmanız (Yeni URL'nize göre güncellendi)
    const firebaseConfig = {
        apiKey: "AIzaSyD0tg7k_iZmR0sR0cHRZkJpOprNr5gQnz8",
        databaseURL: "https://bimkod-ced21-default-rtdb.firebaseio.com"
    };
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // Pydroid'e bağımlılığı kaldırdığımız için direkt ana HF API'sine vuruyoruz
    const API_URL = "https://api-inference.huggingface.co/pipeline/feature-extraction/openai/clip-vit-base-patch32";
    const HF_TOKEN = "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"; // Buraya geçerli hf_ tokenını yaz kanki

    let stream = null;
    let selectedFile = null; 
    let currentVector = null; 

    const video = document.getElementById('webcam');
    const canvas = document.getElementById('canvas');
    const previewImg = document.getElementById('image-preview');
    const previewContainer = document.getElementById('preview-container');
    const cameraContainer = document.getElementById('camera-container');
    const searchBtn = document.getElementById('search-btn');
    const aiStatus = document.getElementById('ai-status-message');

    function setStatus(text, className) {
        aiStatus.innerText = text;
        aiStatus.className = " " + className;
        aiStatus.classList.remove('hidden');
    }

    function cosineSimilarity(vecA, vecB) {
        let dotProduct = 0.0;
        let normA = 0.0;
        let normB = 0.0;
        for (let i = 0; i < vecA.length; i++) {
            dotProduct += vecA[i] * vecB[i];
            normA += vecA[i] * vecA[i];
            normB += vecB[i] * vecB[i];
        }
        if (normA === 0 || normB === 0) return 0;
        return dotProduct / (Math.sqrt(normA) * Math.sqrt(normB));
    }

    document.getElementById('start-camera-btn').addEventListener('click', async function() {
        previewContainer.classList.add('preview-hidden');
        searchBtn.disabled = true;
        selectedFile = null;
        currentVector = null;
        aiStatus.classList.add('hidden');
        
        try {
            stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment" }, 
                audio: false 
            });
            video.srcObject = stream;
            cameraContainer.classList.remove('hidden');
        } catch (err) {
            setStatus("❌ Kamera izni alınamadı!", "status-error");
            console.error(err);
        }
    });

    document.getElementById('capture-btn').addEventListener('click', function() {
        if (stream) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            
            canvas.toBlob(function(blob) {
                selectedFile = blob;
                analizEtVeVektörUret();
            }, 'image/jpeg');

            const dataUrl = canvas.toDataURL('image/jpeg');
            previewImg.src = dataUrl;
            
            stream.getTracks().forEach(track => track.stop());
            cameraContainer.classList.add('hidden');
            previewContainer.classList.remove('preview-hidden');
        }
    });

    document.getElementById('gallery-upload').addEventListener('change', function(event) {
        if (stream) {
            stream.getTracks().forEach(track => track.stop());
            cameraContainer.classList.add('hidden');
        }

        const file = event.target.files[0];
        if (file) {
            selectedFile = file;
            currentVector = null;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                previewImg.src = e.target.result;
                previewContainer.classList.remove('preview-hidden');
                document.getElementById('result-section').classList.add('hidden');
                document.getElementById('gallery-container').innerHTML = '';
                analizEtVeVektörUret();
            };
            reader.readAsDataURL(file);
        }
    });

    async function analizEtVeVektörUret() {
        if (!selectedFile) return;

        setStatus("⏳ Görsel CLIP ile vektörleştiriliyor...", "status-loading");
        searchBtn.disabled = true;

        try {
            // Doğrudan HuggingFace CLIP API'sine görselin ham baytlarını gönderiyoruz kanki
            const response = await fetch(API_URL, {
                method: "POST",
                headers: { "Authorization": `Bearer ${HF_TOKEN}` },
                body: selectedFile
            });

            const embedding = await response.json();

            if (Array.isArray(embedding)) {
                currentVector = Array.isArray(embedding[0]) ? embedding[0] : embedding; 
                setStatus("✓ Görsel tarandı ve eşleşmeye hazır.", "status-success");
                searchBtn.disabled = false; 
            } else {
                setStatus("❌ Yapay zeka tarama hatası! Tokenı kontrol et kanki.", "status-error");
            }
        } catch (error) {
            setStatus("❌ Sunucu bağlantı hatası!", "status-error");
            console.error(error);
        }
    }

    searchBtn.addEventListener('click', function() {
        if (!currentVector) return;

        setStatus("🔍 Veritabanındaki ürünler taranıyor...", "status-loading");

        database.ref('afisler').once('value').then((snapshot) => {
            const afisler = snapshot.val();
            if (!afisler) {
                setStatus("❌ Veritabanında taranmış afiş yok!", "status-error");
                return;
            }

            let sonuclar = [];

            // Pydroid'in yüklediği yeni zengin yapıyı tarıyoruz
            for (let key in afisler) {
                const dbAfis = afisler[key];
                
                // Afişin içindeki kırpılmış tüm ürünleri tek tek dolaşıyoruz
                if (dbAfis.urunler && Array.isArray(dbAfis.urunler)) {
                    dbAfis.urunler.forEach((urun) => {
                        if (urun.vektor && Array.isArray(urun.vektor)) {
                            const skor = cosineSimilarity(currentVector, urun.vektor);
                            
                            sonuclar.push({
                                mesaj_id: dbAfis.mesaj_id,
                                kanal: dbAfis.kanal,
                                afis_gorsel: dbAfis.afis_gorsel,
                                urun_gorsel: urun.urun_gorsel,
                                skor: skor
                            });
                        }
                    });
                }
            }

            // En yüksek benzerliğe göre sıralıyoruz
            sonuclar.sort((a, b) => b.skor - a.skor);

            // Ekranda çok kalabalık olmasın diye en yakın 3 sonucu seçtik
            const enYakinUc = sonuclar.slice(0, 3);

            const galleryContainer = document.getElementById('gallery-container');
            galleryContainer.innerHTML = '';

            if(enYakinUc.length === 0) {
                setStatus("⚠️ Eşleşen ürün bulunamadı.", "status-error");
                return;
            }

            enYakinUc.forEach((item, index) => {
                const yuzdeSkor = (item.skor * 100).toFixed(1);
                const uniqueWidgetId = `tg-widget-${item.mesaj_id}-${index}`;

                const card = document.createElement('div');
                card.className = 'result-card';
                
                // Tam aradığın görsel düzen: Kırpılan ürün, Tam afiş ve Canlı Telegram Embed Kutusu!
                card.innerHTML = `
                    <div class="match-score">🎯 %${yuzdeSkor} Eşleşme</div>
                    
                    <div class="image-preview-block">
                        <div class="image-box">
                            <p>🔍 Kesilen Ürün:</p>
                            <img src="data:image/jpeg;base64,${item.urun_gorsel}" alt="Ürün Önizleme">
                        </div>
                        <div class="image-box">
                            <p>🖼️ Orijinal Afiş:</p>
                            <img src="data:image/jpeg;base64,${item.afis_gorsel}" alt="Afiş Önizleme">
                        </div>
                    </div>
                    
                    <div class="widget-wrapper">
                        <p style="margin:5px; font-size:12px; font-weight:bold; color:#0088cc;">✈️ Telegram Orijinal Mesaj Önizlemesi:</p>
                        <div id="${uniqueWidgetId}"></div>
                    </div>
                `;

                galleryContainer.appendChild(card);

                // Telegram widget'ını dinamik olarak tetikliyoruz kanki kilit nokta burası
                const scriptTag = document.createElement('script');
                scriptTag.src = "https://telegram.org/js/telegram-widget.js?22";
                scriptTag.setAttribute("data-telegram-post", `${item.kanal}/${item.mesaj_id}`);
                scriptTag.setAttribute("data-width", "100%");
                scriptTag.setAttribute("data-userpic", "false");
                
                document.getElementById(uniqueWidgetId).appendChild(scriptTag);
            });

            setStatus("✓ Sonuçlar listelendi kanki!", "status-success");
            document.getElementById('result-section').classList.remove('hidden');

        }).catch((error) => {
            setStatus("❌ Veri çekme hatası!", "status-error");
            console.error(error);
        });
    });

    document.getElementById('reset-btn').addEventListener('click', function() {
        location.reload();
    });
</script>

</body>
</html>
