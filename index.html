<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bimkod</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
            border-top: 5px solid #d9534f;
            margin-top: 20px;
        }
        header h1 {
            color: #333333;
            margin-bottom: 20px;
            font-size: 24px;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }
        
        .upload-btn, .trigger-btn {
            flex: 1;
            display: inline-block;
            color: white;
            padding: 12px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            border: none;
            transition: background-color 0.3s;
        }
        .camera-btn { background-color: #0275d8; }
        .camera-btn:hover { background-color: #025aa5; }
        .gallery-btn { background-color: #d9534f; }
        .gallery-btn:hover { background-color: #c9302c; }

        #camera-container {
            margin-top: 15px;
            position: relative;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
        }
        #webcam {
            width: 100%;
            height: auto;
            display: block;
        }
        .capture-action-btn {
            background-color: #5bc0de;
            color: white;
            margin: 10px 0;
        }

        #preview-container {
            margin-top: 10px;
        }
        #preview-container img {
            max-width: 100%;
            max-height: 250px;
            object-fit: contain;
            border: 2px dashed #cccccc;
            padding: 5px;
            border-radius: 8px;
        }
        .preview-hidden { display: none; }
        
        .action-btn, .reset-btn {
            margin-top: 15px;
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            transition: background-color 0.3s;
        }
        .action-btn { background-color: #5cb85c; color: white; }
        .action-btn:hover:not(:disabled) { background-color: #4cae4c; }
        .action-btn:disabled { background-color: #cccccc; cursor: not-allowed; }
        .reset-btn { background-color: #333333; color: white; }
        .reset-btn:hover { background-color: #222222; }
        
        #loading-message { margin-top: 20px; font-style: italic; color: #666666; }
        .hidden { display: none; }
        
        #result-section { margin-top: 30px; border-top: 2px solid #eeeeee; padding-top: 20px; }
        .gallery-title { font-size: 16px; font-weight: bold; color: #333; margin-bottom: 15px; }
        .gallery { display: flex; flex-direction: column; gap: 20px; }
        
        /* Yeni Kart Yapısı (Resim + Güven Skoru) */
        .result-card {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: left;
        }
        .result-card img {
            width: 100%;
            display: block;
        }
        .result-info {
            padding: 10px 15px;
            font-weight: bold;
            color: #333;
            background: #f9f9f9;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Ürün Arama Asistanı</h1>
    </header>
    <main>
        
        <div class="button-group">
            <button id="start-camera-btn" class="trigger-btn camera-btn">📷 Kamerayı Aç</button>
            <label for="gallery-upload" class="upload-btn gallery-btn" style="text-align: center;">🖼️ Galeriden Seç</label>
            <input type="file" id="gallery-upload" accept="image/*" hidden>
        </div>

        <div id="camera-container" class="hidden">
            <video id="webcam" autoplay playsinline></video>
            <button id="capture-btn" class="trigger-btn capture-action-btn">📸 Fotoğrafı Çek</button>
        </div>
        
        <div id="preview-container" class="preview-hidden">
            <img id="image-preview" src="#" alt="Aranacak Ürün">
        </div>
        
        <canvas id="canvas" class="hidden"></canvas>
        
        <button id="search-btn" class="action-btn" disabled>Benzer Afişleri Bul</button>
        
        <div id="loading-message" class="hidden">Yapay zeka görseli analiz ediyor, lütfen bekleyiniz...</div>
        
        <div id="result-section" class="hidden">
            <div class="gallery-title">En Yakın 5 Eşleşme:</div>
            <div id="gallery-container" class="gallery"></div>
        </div>
        
        <button id="reset-btn" class="reset-btn">Yeni Arama Yap</button>
    </main>
</div>

<script>
    // 🌍 BURAYA HUGGING FACE'TEN ALACAĞIMIZ URL'Yİ YAPIŞTIRACAĞIZ
    const API_URL = "https://deimnegric-bimkod.hf.space"; 

    let stream = null;
    let selectedFile = null; // Dosya verisini saklamak için
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('canvas');
    const previewImg = document.getElementById('image-preview');
    const previewContainer = document.getElementById('preview-container');
    const cameraContainer = document.getElementById('camera-container');
    const searchBtn = document.getElementById('search-btn');

    document.getElementById('start-camera-btn').addEventListener('click', async function() {
        previewContainer.classList.add('preview-hidden');
        searchBtn.disabled = true;
        selectedFile = null;
        
        try {
            stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment" }, 
                audio: false 
            });
            video.srcObject = stream;
            cameraContainer.classList.remove('hidden');
        } catch (err) {
            alert("Kamera izni alınamadı!");
            console.error(err);
        }
    });

    document.getElementById('capture-btn').addEventListener('click', function() {
        if (stream) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // Canlı çekilen resmi Blob (dosya) formatına çeviriyoruz ki API'ye yollayabilelim
            canvas.toBlob(function(blob) {
                selectedFile = blob;
            }, 'image/jpeg');

            const dataUrl = canvas.toDataURL('image/jpeg');
            previewImg.src = dataUrl;
            
            stream.getTracks().forEach(track => track.stop());
            cameraContainer.classList.add('hidden');
            
            previewContainer.classList.remove('preview-hidden');
            searchBtn.disabled = false;
        }
    });

    document.getElementById('gallery-upload').addEventListener('change', function(event) {
        if (stream) {
            stream.getTracks().forEach(track => track.stop());
            cameraContainer.classList.add('hidden');
        }

        const file = event.target.files[0];
        if (file) {
            selectedFile = file; // Galeriden seçilen dosyayı kaydet
            const reader = new FileReader();
            reader.onload = function(e) {
                previewImg.src = e.target.result;
                previewContainer.classList.remove('preview-hidden');
                searchBtn.disabled = false;
                
                document.getElementById('result-section').classList.add('hidden');
                document.getElementById('gallery-container').innerHTML = '';
            };
            reader.readAsDataURL(file);
        }
    });

    // 🚀 GERÇEK YAPAY ZEKA BAĞLANTI NOKTASI
    searchBtn.addEventListener('click', async function() {
        if (!selectedFile) return;

        document.getElementById('loading-message').classList.remove('hidden');
        searchBtn.disabled = true;

        // Form verisi hazırlıyoruz (Resmi Python backend'e göndermek için)
        const formData = new FormData();
        formData.append("file", selectedFile, "urun.jpg");

        try {
            // Hugging Face sunucumuza resmi post ediyoruz
            const response = await fetch(`${API_URL}/vektor-uret`, {
                method: "POST",
                body: formData
            });

            const data = await response.json();
            document.getElementById('loading-message').classList.add('hidden');

            if (data.status === "success") {
                // Yapay zeka resmin imzasını (vektörünü) başarıyla üretti!
                console.log("Yapay Zeka Vektör İmzası Başarıyla Alındı kanki:", data.vector);
                alert("Yapay zeka resmi analiz etti ve 512 boyutlu imzasını çıkardı! Detaylar tarayıcı konsolunda.");

                // 🛠️ BİR SONRAKİ ADIMDA BURAYA FIREBASE BAĞLANIP EN YAKIN 5 AFİŞİ ÇEKECEĞİZ
                // Şimdilik simüle edilmiş 5 afişi güven skorlarıyla ekrana basalım
                const galleryContainer = document.getElementById('gallery-container');
                galleryContainer.innerHTML = ''; 

                const sahteSkorlar = ["🎯 %96 Eşleşme", "🤔 %84 Eşleşme", "🔍 %79 Eşleşme", "📉 %61 Eşleşme", "❌ %44 Eşleşme"];
                
                for(let i = 0; i < 5; i++) {
                    const card = document.createElement('div');
                    card.className = 'result-card';
                    
                    const imgElement = document.createElement('img');
                    imgElement.src = previewImg.src; // Şimdilik test amaçlı aynı resim
                    
                    const infoElement = document.createElement('div');
                    infoElement.className = 'result-info';
                    infoElement.innerText = sahteSkorlar[i];
                    
                    card.appendChild(imgElement);
                    card.appendChild(infoElement);
                    galleryContainer.appendChild(card);
                }
                document.getElementById('result-section').classList.remove('hidden');

            } else {
                alert("Yapay zeka motorunda bir hata oluştu: " + data.message);
            }
        } catch (error) {
            document.getElementById('loading-message').classList.add('hidden');
            alert("Sunucuya bağlanılamadı kanki! API_URL'nin doğru olduğundan ve Hugging Face sunucunun 'Running' olduğundan emin ol.");
            console.error(error);
        }

        searchBtn.disabled = false;
    });

    document.getElementById('reset-btn').addEventListener('click', function() {
        location.reload();
    });
</script>

</body>
</html>
