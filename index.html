<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Kurumsal Ürün Arama</title>
    <style>
        body { font-family: sans-serif; background: #f0f0f0; padding: 20px; display: flex; justify-content: center; }
        .container { background: #fff; padding: 30px; border-radius: 8px; width: 100%; max-width: 600px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .button-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .trigger-btn { flex: 1; padding: 12px; border: none; border-radius: 4px; color: white; font-weight: bold; cursor: pointer; }
        .camera-btn { background: #0275d8; }
        .gallery-btn { background: #d9534f; }
        .action-btn { background: #5cb85c; color: white; width: 100%; padding: 12px; border: none; margin-top: 15px; cursor: pointer; }
        .hidden { display: none; }
        #gallery-container { margin-top: 20px; display: flex; flex-direction: column; gap: 20px; }
        .result-card { border: 1px solid #ddd; padding: 15px; border-radius: 8px; }
        .image-preview-block { display: flex; gap: 10px; }
        .image-box img { max-width: 150px; border-radius: 5px; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>
    <div class="container">
        <h1>Ürün Arama Asistanı</h1>
        <div class="button-group">
            <button id="start-camera-btn" class="trigger-btn camera-btn">📷 Kamera</button>
            <label for="gallery-upload" class="trigger-btn gallery-btn">🖼️ Galeri</label>
            <input type="file" id="gallery-upload" accept="image/*" hidden>
        </div>
        <div id="camera-container" class="hidden"><video id="webcam" autoplay playsinline style="width:100%"></video><button id="capture-btn" class="trigger-btn" style="background:#5bc0de; width:100%; margin-top:10px;">Çek</button></div>
        <div id="preview-container" class="hidden"><img id="image-preview" src="#" style="max-width:100%; margin-top:10px;"></div>
        <button id="search-btn" class="action-btn" disabled>Benzer Afişleri Bul</button>
        <div id="gallery-container"></div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://bimkod-ced21-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const API_URL = "https://deimnegric-bimkodyeni.hf.space";

        let currentVector = null;

        // Vektör Üretim Fonksiyonu (Space'e istek atar)
        async function analizEt(file) {
            const formData = new FormData();
            formData.append("file", file);
            const res = await fetch(`${API_URL}/vektor-uret`, { method: "POST", body: formData });
            const data = await res.json();
            currentVector = data.vector;
            document.getElementById('search-btn').disabled = false;
        }

        // Cosine Similarity Arama
        function cosineSimilarity(vecA, vecB) {
            let dot = 0, normA = 0, normB = 0;
            for(let i=0; i<vecA.length; i++) { dot += vecA[i]*vecB[i]; normA += vecA[i]**2; normB += vecB[i]**2; }
            return dot / (Math.sqrt(normA) * Math.sqrt(normB));
        }

        document.getElementById('search-btn').addEventListener('click', () => {
            database.ref('afisler').once('value').then(snapshot => {
                const afisler = snapshot.val();
                let sonuclar = [];
                for(let key in afisler) {
                    afisler[key].urunler.forEach(urun => {
                        sonuclar.push({ ...afisler[key], skor: cosineSimilarity(currentVector, urun.vektor), urun_gorsel: urun.urun_gorsel });
                    });
                }
                sonuclar.sort((a,b) => b.skor - a.skor).slice(0, 3).forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'result-card';
                    card.innerHTML = `<h3>%${(item.skor*100).toFixed(1)} Eşleşme</h3>
                        <div class="image-preview-block">
                            <div><p>Kesilen:</p><img src="data:image/jpeg;base64,${item.urun_gorsel}"></div>
                            <div><p>Afiş:</p><img src="data:image/jpeg;base64,${item.afis_gorsel}"></div>
                        </div>
                        <div id="tg-widget-${item.mesaj_id}"></div>`;
                    document.getElementById('gallery-container').appendChild(card);
                    const script = document.createElement('script');
                    script.src = "https://telegram.org/js/telegram-widget.js?22";
                    script.setAttribute("data-telegram-post", `${item.kanal}/${item.mesaj_id}`);
                    script.setAttribute("data-width", "100%");
                    document.getElementById(`tg-widget-${item.mesaj_id}`).appendChild(script);
                });
            });
        });
        // Kamera/Galeri eventleri... (Daha önce verdiğimiz yapıyla aynı)
    </script>
</body>
</html>
