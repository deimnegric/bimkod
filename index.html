<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>BİM Pro Arama</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <style>
        body { font-family: sans-serif; background: #f8f9fa; padding: 20px; text-align: center; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        #image { max-width: 100%; display: none; }
        #result { margin-top: 20px; padding: 15px; border-radius: 10px; background: #eee; }
    </style>
</head>
<body>

<div class="container">
    <h3>Ürün Arama Asistanı</h3>
    <input type="file" id="input" accept="image/*" style="display:none">
    <button onclick="document.getElementById('input').click()">📸 Fotoğraf/Galeri</button>

    <div style="margin: 20px 0;">
        <img id="image">
    </div>

    <button id="scan-btn" style="display:none; width: 100%; padding: 15px; background: green; color: white; border: none; border-radius: 10px;">🔍 Tara ve Bul</button>
    <div id="result">Sonuç burada görünecek...</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
<script>
    let cropper;
    const image = document.getElementById('image');
    const resultDiv = document.getElementById('result');

    // 1. Resim seçilince Cropper'ı başlat
    document.getElementById('input').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            image.src = e.target.result;
            image.style.display = 'block';
            document.getElementById('scan-btn').style.display = 'block';
            if(cropper) cropper.destroy();
            cropper = new Cropper(image, { viewMode: 1 });
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    // 2. Tara Butonu
    document.getElementById('scan-btn').onclick = async () => {
        resultDiv.innerText = "🚀 Vektör üretiliyor...";
        cropper.getCroppedCanvas().toBlob(async (blob) => {
            // A. Backend'e vektör gönder
            const formData = new FormData();
            formData.append('file', blob);
            const res = await fetch("https://deimnegric-bimkod.hf.space/vektor-uret", { method: "POST", body: formData });
            const data = await res.json();
            
            if(!data.vector) return resultDiv.innerText = "Hata!";

            // B. products.json dosyasını çek (Bu dosya GitHub'da index.html'in yanında olmalı)
            resultDiv.innerText = "🔍 Veritabanı aranıyor...";
            const dbRes = await fetch('products.json');
            const database = await dbRes.json();

            // C. Kosinüs Benzerliği ile karşılaştır
            let bestMatch = null;
            let highestScore = 0;

            database.forEach(item => {
                let dot = 0;
                for(let i=0; i<data.vector.length; i++) dot += data.vector[i] * item.vector[i];
                if(dot > highestScore) {
                    highestScore = dot;
                    bestMatch = item;
                }
            });

            // D. Sonucu göster
            if(highestScore > 0.70) {
                resultDiv.innerHTML = `✅ <b>Bulundu:</b> ${bestMatch.name}<br>🎯 <b>Skor:</b> %${(highestScore*100).toFixed(1)}`;
            } else {
                resultDiv.innerText = "❌ Ürün bulunamadı (Skor düşük).";
            }
        });
    };
</script>
</body>
</html>
