<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ürün Arama Asistanı</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { background: #fff; padding: 15px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        button, label { padding: 12px; border-radius: 12px; border: none; background: #eef2ff; color: #4338ca; font-weight: bold; cursor: pointer; }
        #preview-container { margin: 15px 0; border-radius: 15px; overflow: hidden; background: #000; min-height: 200px; }
        video, img { width: 100%; display: block; }
        #scan-btn, #capture-btn { width: 100%; padding: 15px; border-radius: 12px; border: none; color: #fff; font-weight: bold; margin-top: 10px; }
        #capture-btn { background: #4f46e5; display: none; }
        #scan-btn { background: #059669; display: none; }
        #result-container { margin-top: 20px; border-top: 2px solid #eee; padding-top: 15px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Ürün Asistanı</h2>
    <div class="btn-group">
        <button id="camera-btn">📸 Fotoğraf Çek</button>
        <label for="file-input">🖼️ Galeriden Seç</label>
        <input type="file" id="file-input" accept="image/*" style="display:none">
    </div>
    <div id="preview-container"><video id="video" autoplay playsinline></video><img id="img-preview" style="display:none"></div>
    <button id="capture-btn">Çek</button>
    <button id="scan-btn">🔍 TARA VE BUL</button>
    <div id="status"></div>
    <div id="result-container">
        <h4>Eşleşen Afiş:</h4>
        <div id="telegram-result"></div>
    </div>
</div>

<script src="config.js"></script>
<script>
    // Sabitleri buraya, en tepeye koyuyoruz
    const HF_API_URL = "https://deimnegric-bimkod.hf.space/vektor-uret";
    
    // Değişkenleri tanımlıyoruz
    const fileInput = document.getElementById('file-input');
    const scanBtn = document.getElementById('scan-btn');
    let selectedFile = null;

    // Galeri seçimi sonrası butonu göster
    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        selectedFile = file;
        // ... (önizleme kodların aynı kalabilir)
        scanBtn.style.display = 'block'; 
    };

    // Tara ve Bul fonksiyonu
    scanBtn.onclick = async () => {
        document.getElementById('status').innerHTML = "Analiz ediliyor...";
        const fd = new FormData(); 
        fd.append("file", selectedFile);
        
        try {
            // HF_API_URL artık burada tanımlı olduğu için hata vermeyecek
            const res = await fetch(HF_API_URL, { method: "POST", body: fd });
            const data = await res.json();
            
            if(data.file_id) {
                // TOKEN kontrolü
                const botToken = window.TOKEN; 
                if (!botToken) {
                    throw new Error("Token bulunamadı!");
                }
                
                document.getElementById('result-container').style.display = 'block';
                document.getElementById('telegram-result').innerHTML = `
                   <img src="https://api.telegram.org/file/bot${botToken}/${data.file_id}" style="width:100%; border-radius:10px">
                `;
                document.getElementById('status').innerHTML = "✅ Başarılı!";
            }
        } catch(e) {
            document.getElementById('status').innerHTML = "❌ Hata: " + e.message;
        }
    };
</script>




</body>
</html>
