<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kurumsal Ürün Arama</title>
<style>
body {
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
background-color: #f0f0f0;
margin: 0;
padding: 20px;
display: flex;
justify-content: center;
}
.container {
background-color: #ffffff;
padding: 30px;
border-radius: 8px;
box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
max-width: 500px;
width: 100%;
text-align: center;
}
h1 { color: #333333; margin-bottom: 20px; font-size: 20px; }
.button-group { display: flex; gap: 10px; margin-bottom: 20px; }
.btn { flex: 1; padding: 12px; border: none; border-radius: 4px; color: white; font-weight: bold; cursor: pointer; transition: background-color 0.3s; }
.camera-btn { background-color: #0275d8; }
.gallery-btn { background-color: #d9534f; }
.action-btn { background-color: #5cb85c; width: 100%; padding: 12px; margin-top: 10px; }
#camera-container { margin-bottom: 15px; position: relative; }
#webcam { width: 100%; border-radius: 8px; }
.hidden { display: none; }
#preview-container img { max-width: 100%; border-radius: 8px; margin-top: 10px; }
</style>
</head>
<body>
<div class="container">
<h1>Ürün Arama Asistanı</h1>
<div class="button-group">
<button id="start-camera-btn" class="btn camera-btn">📷 Kamera</button>
<label for="gallery-upload" class="btn gallery-btn" style="text-align: center; line-height: normal; display: flex; align-items: center; justify-content: center;">🖼️ Galeri</label>
<input type="file" id="gallery-upload" accept="image/*" hidden>
</div>
<div id="camera-container" class="hidden">
<video id="webcam" autoplay playsinline></video>
<button id="capture-btn" class="btn" style="background-color: #5bc0de; margin-top: 10px;">📸 Çek</button>
</div>
<div id="preview-container">
<img id="image-preview" src="#" alt="Önizleme" class="hidden">
</div>
<canvas id="canvas" class="hidden"></canvas>
<button id="search-btn" class="btn action-btn" disabled>Afişi Bul</button>
<div id="result-section"></div>
</div>
<script>
// Arayüz mantığı buraya gelecek
</script>
</body>
</html>
