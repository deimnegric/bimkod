<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Ürün Arama Asistanı</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; display: flex; justify-content: center; }
        .container { background: #fff; padding: 20px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        button, label { padding: 15px; border-radius: 12px; border: 1px solid #ddd; cursor: pointer; background: #fff; }
        #preview-container { margin-top: 15px; display: none; }
        video, img { width: 100%; border-radius: 10px; }
        #scan-btn, #capture-btn { display: none; margin-top: 15px; padding: 15px; width: 100%; border: none; border-radius: 10px; color: #fff; background: #10b981; }
        #capture-btn { background: #2563eb; }
    </style>
</head>
<body>

<div class="container">
    <h2>Ürün Arama Asistanı</h2>
    <div class="btn-group">
        <button id="camera-btn">Fotoğraf Çek<br>📸</button>
        <label for="file-input">Galeriden Seç<br>🖼️</label>
        <input type="file" id="file-input" accept="image/*">
    </div>
    <div id="preview-container">
        <video id="video" autoplay playsinline></video>
        <img id="img-preview" style="display:none;">
    </div>
    <button id="capture-btn">📸 Çek</button>
    <button id="scan-btn">🔍 TARA VE BUL</button>
    <div id="status"></div>
    <div id="result-container" style="display:none;">
        <div id="telegram-result"></div>
    </div>
</div>

<script src="config.js"></script>
<script>
    const HF_API_URL = "https://deimnegric-bimkod.hf.space/vektor-uret";
    // .json uzantısı çok önemli, tüm datayı çekmek için
    const FIREBASE_URL = "https://bimkod-ced21-default-rtdb.europe-west1.firebasedatabase.app/vektorler.json";

    const video = document.getElementById('video'), imgPrev = document.getElementById('img-preview');
    const scanBtn = document.getElementById('scan-btn'), captureBtn = document.getElementById('capture-btn');
    let selectedFile = null;

    // Kamera Açma
    document.getElementById('camera-btn').onclick = async () => {
        document.getElementById('preview-container').style.display = 'block';
        video.style.display = 'block'; imgPrev.style.display = 'none';
        captureBtn.style.display = 'block'; scanBtn.style.display = 'none';
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        video.srcObject = stream;
    };

    // Dosya Seçme
    document.getElementById('file-input').onchange = (e) => {
        if(e.target.files.length > 0) {
            selectedFile = e.target.files[0];
            imgPrev.src = URL.createObjectURL(selectedFile);
            document.getElementById('preview-container').style.display = 'block';
            imgPrev.style.display = 'block'; video.style.display = 'none';
            captureBtn.style.display = 'none'; scanBtn.style.display = 'block';
        }
    };

    // Fotoğraf Çekme
    captureBtn.onclick = () => {
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        canvas.toBlob(blob => {
            selectedFile = new File([blob], "c.jpg");
            imgPrev.src = URL.createObjectURL(blob);
            imgPrev.style.display = 'block'; video.style.display = 'none';
            captureBtn.style.display = 'none'; scanBtn.style.display = 'block';
            video.srcObject.getTracks().forEach(t => t.stop());
        }, 'image/jpeg');
    };

    // İki vektör arasındaki benzerliği hesaplayan fonksiyon
    function cosineSimilarity(vecA, vecB) {
        let dotProduct = 0, normA = 0, normB = 0;
        for (let i = 0; i < vecA.length; i++) {
            dotProduct += vecA[i] * vecB[i];
            normA += vecA[i] * vecA[i];
            normB += vecB[i] * vecB[i];
        }
        return dotProduct / (Math.sqrt(normA) * Math.sqrt(normB));
    }

    // TARA VE BUL BUTONU
    scanBtn.onclick = async () => {
        document.getElementById('status').innerHTML = "⏳ Görüntü işleniyor (HF API)...";
        document.getElementById('result-container').style.display = 'none';
        
        try {
            // 1. Görüntüyü HF API'ye gönder ve Vektör al
            const fd = new FormData(); 
            fd.append("file", selectedFile);
            const res = await fetch(HF_API_URL, { method: "POST", body: fd });
            const hfData = await res.json();
            const queryVector = hfData.vector; // app.py "vector" anahtarı ile dönüyor

            if (!queryVector) throw new Error("Vektör çıkarılamadı!");

            document.getElementById('status').innerHTML = "🔍 Veritabanında (Firebase) eşleşme aranıyor...";

            // 2. Firebase'den kayıtlı tüm vektörleri çek
            const dbRes = await fetch(FIREBASE_URL);
            const dbData = await dbRes.json();

            // 3. Tek tek karşılaştır ve en yüksek benzerliği bul
            let bestMatch = null;
            let highestScore = -1;

            for (let key in dbData) {
                const item = dbData[key];
                if (item.vektor && item.vektor.length > 0) { // veritabanı "vektor" anahtarı tutuyor olmalı
                    const score = cosineSimilarity(queryVector, item.vektor);
                    if (score > highestScore) {
                        highestScore = score;
                        bestMatch = item;
                    }
                }
            }

            // 4. Eşik değerin (örneğin %85) üzerindeyse göster
            if (bestMatch && highestScore > 0.85) {
                const yuzde = (highestScore * 100).toFixed(1);
                document.getElementById('status').innerHTML = `✅ <b>Eşleşme Bulundu!</b> (Benzerlik: %${yuzde})`;
                
                document.getElementById('telegram-result').innerHTML = `
                   <img src="https://api.telegram.org/file/bot${window.TOKEN}/${bestMatch.file_id}" style="width:100%; border-radius:10px;">
                   <a href="https://t.me/c/2458145229/${bestMatch.afis_id}" target="_blank" style="display:block; padding:15px; background:#2563eb; color:#fff; text-decoration:none; margin-top:10px; border-radius:10px;">Afişi Aç (ID: ${bestMatch.afis_id})</a>
                `;
                document.getElementById('result-container').style.display = 'block';
            } else {
                document.getElementById('status').innerHTML = "❌ Eşleşen ürün bulunamadı veya fotoğraf yeterince net değil.";
            }

        } catch (error) {
            document.getElementById('status').innerHTML = "❌ Hata oluştu: " + error.message;
        }
    };
</script>

</body>
</html>
