<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ürün Arama Asistanı</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { background: #fff; padding: 15px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        button, label { padding: 12px; border-radius: 12px; border: none; background: #eef2ff; color: #4338ca; font-weight: bold; cursor: pointer; }
        #preview-container { margin: 15px 0; border-radius: 15px; overflow: hidden; background: #000; min-height: 200px; display: none; }
        video, img { width: 100%; display: block; }
        #scan-btn, #capture-btn { width: 100%; padding: 15px; border-radius: 12px; border: none; color: #fff; font-weight: bold; margin-top: 10px; }
        #capture-btn { background: #4f46e5; display: none; }
        #scan-btn { background: #059669; display: none; }
        #result-container { margin-top: 20px; border-top: 2px solid #eee; padding-top: 15px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Ürün Asistanı</h2>
    <div class="btn-group">
        <button id="camera-btn">📸 Fotoğraf Çek</button>
        <label for="file-input">🖼️ Galeriden Seç</label>
        <input type="file" id="file-input" accept="image/*" style="display:none">
    </div>
    
    <div id="preview-container">
        <video id="video" autoplay playsinline></video>
        <img id="img-preview" style="display:none">
    </div>

    <button id="capture-btn">Çek</button>
    <button id="scan-btn">🔍 TARA VE BUL</button>
    <div id="status"></div>
    <div id="result-container">
        <h4>Eşleşen Afiş:</h4>
        <div id="telegram-result"></div>
    </div>
</div>

<script src="config.js"></script>
<script>
    const HF_API_URL = "https://deimnegric-bimkod.hf.space/vektor-uret";
    const FIREBASE_URL = "https://bimkod-ced21-default-rtdb.europe-west1.firebasedatabase.app/vektorler.json";
    let selectedFile = null;

    const video = document.getElementById('video');
    const imgPreview = document.getElementById('img-preview');
    const captureBtn = document.getElementById('capture-btn');
    const scanBtn = document.getElementById('scan-btn');
    const statusDiv = document.getElementById('status');
    const telegramResult = document.getElementById('telegram-result');

    document.getElementById('camera-btn').onclick = async () => {
        document.getElementById('preview-container').style.display = 'block';
        video.style.display = 'block';
        imgPreview.style.display = 'none';
        captureBtn.style.display = 'block';
        scanBtn.style.display = 'none';
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;
        } catch (e) { alert("Kamera izni alınamadı!"); }
    };

    document.getElementById('file-input').onchange = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        selectedFile = file;
        imgPreview.src = URL.createObjectURL(file);
        imgPreview.style.display = 'block';
        video.style.display = 'none';
        captureBtn.style.display = 'none';
        scanBtn.style.display = 'block';
        document.getElementById('preview-container').style.display = 'block';
    };

    captureBtn.onclick = () => {
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        canvas.toBlob(blob => {
            selectedFile = new File([blob], "c.jpg");
            imgPreview.src = URL.createObjectURL(blob);
            imgPreview.style.display = 'block';
            video.style.display = 'none';
            captureBtn.style.display = 'none';
            scanBtn.style.display = 'block';
            video.srcObject.getTracks().forEach(t => t.stop());
        }, 'image/jpeg');
    };

    scanBtn.onclick = async () => {
        statusDiv.innerHTML = "Analiz ediliyor...";
        const fd = new FormData();
        fd.append("file", selectedFile);

            const res = await fetch(HF_API_URL, { method: "POST", body: fd });
            const result = await res.json();
            const targetVector = result.vectors;

            const dbRes = await fetch(FIREBASE_URL);
            const dbData = await dbRes.json();
            
            // ... (API'den veriyi çektikten sonra)

Object.values(dbData).forEach(item => {
    if (item.vektorler) {
        let dist = 0;
        for(let i=0; i<targetVector.length; i++) {
            dist += Math.pow(targetVector[i] - item.vektorler[i], 2);

// EŞİK DEĞERİ (0.5) KALDIRILDI, EN YAKIN OLANI GETİRMESİ SAĞLANDI
if (bestMatch) { 
    document.getElementById('result-container').style.display = 'block';
    telegramResult.innerHTML = `<img src="https://api.telegram.org/file/bot${window.TOKEN}/${bestMatch.file_id}" style="width:100%; border-radius:10px">`;
    statusDiv.innerHTML = "✅ Ürün bulundu! (Mesafe: " + minDistance.toFixed(2) + ")";
} else {
    statusDiv.innerHTML = "❌ Hiçbir eşleşme bulunamadı.";
}

</script>
</body>
</html>
