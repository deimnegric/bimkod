<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Kurumsal Ürün Arama</title>
    <style>
        body { font-family: sans-serif; background: #f0f0f0; padding: 20px; display: flex; justify-content: center; }
        .container { background: #fff; padding: 30px; border-radius: 8px; width: 100%; max-width: 600px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn { padding: 12px; border: none; border-radius: 4px; color: white; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        .resim-alani { display: flex; gap: 10px; margin-top: 15px; }
        .resim-alani img { width: 150px; border-radius: 5px; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>
    <div class="container">
        <h1>Ürün Arama Asistanı</h1>
        <input type="file" id="upload" accept="image/*">
        <button id="ara" class="btn" style="background:#5cb85c;">Benzerleri Bul</button>
        <div id="sonuclar"></div>
    </div>

    <script>
        firebase.initializeApp({databaseURL: "https://bimkod-ced21-default-rtdb.firebaseio.com"});
        const database = firebase.database();
        const HF_TOKEN = "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"; 

        document.getElementById('ara').onclick = async () => {
            const file = document.getElementById('upload').files[0];
            const vecRes = await fetch("https://api-inference.huggingface.co/pipeline/feature-extraction/openai/clip-vit-base-patch32", 
                {method: "POST", headers: {"Authorization": `Bearer ${HF_TOKEN}`}, body: file});
            const vec = await vecRes.json();
            
            database.ref('afisler').once('value').then(s => {
                let list = [];
                s.forEach(child => {
                    child.val().urunler.forEach(u => {
                        list.push({ ...child.val(), u_g: u.urun_gorsel, skor: (Math.random()) }); // Buraya Cosine fonksiyonunu koy
                    });
                });
                list.sort((a,b) => b.skor - a.skor).slice(0, 3).forEach(item => {
                    document.getElementById('sonuclar').innerHTML += `
                        <div class="resim-alani">
                            <img src="data:image/jpeg;base64,${item.u_g}">
                            <img src="data:image/jpeg;base64,${item.afis_gorsel}">
                        </div>
                        <div id="tg-${item.mesaj_id}"></div>`;
                    const s = document.createElement('script');
                    s.src = "https://telegram.org/js/telegram-widget.js?22";
                    s.setAttribute("data-telegram-post", `${item.kanal}/${item.mesaj_id}`);
                    s.setAttribute("data-width", "100%");
                    document.getElementById(`tg-${item.mesaj_id}`).appendChild(s);
                });
            });
        };
    </script>
</body>
</html>
