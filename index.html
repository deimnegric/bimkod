<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ürün Bulucu</title>
    <style>
        :root { --primary: #007AFF; --bg: #F5F5F7; --card: #FFFFFF; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .card { background: var(--card); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; }
        .btn { border: none; padding: 15px; border-radius: 12px; font-weight: 600; cursor: pointer; margin: 5px; transition: 0.3s; width: 100%; }
        .btn-main { background: var(--primary); color: white; }
        .btn-sec { background: #E5E5EA; color: #333; }
        #webcam { width: 100%; border-radius: 15px; margin: 10px 0; background: #000; }
        #sonuc { margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin-top: 0;">Ürün Asistanı</h2>
    
    <video id="webcam" autoplay playsinline class="hidden"></video>
    <img id="preview" style="width: 100%; border-radius: 15px; display: none;">
    
    <button class="btn btn-sec" onclick="startCamera()">📷 Kamerayı Aç</button>
    <input type="file" id="upload" accept="image/*" hidden onchange="previewFile()">
    <button class="btn btn-sec" onclick="document.getElementById('upload').click()">🖼️ Galeriden Seç</button>
    
    <button class="btn btn-main" id="bulBtn" onclick="ara()">Afişi Bul</button>
    
    <div id="sonuc"></div>
</div>

<script>
    function startCamera() {
        const video = document.getElementById('webcam');
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(stream => { video.srcObject = stream; video.classList.remove('hidden'); });
    }
    
    function previewFile() {
        const file = document.getElementById('upload').files[0];
        const reader = new FileReader();
        reader.onload = e => { 
            document.getElementById('preview').src = e.target.result;
            document.getElementById('preview').style.display = 'block';
            document.getElementById('webcam').classList.add('hidden');
        };
        reader.readAsDataURL(file);
    }

    function ara() {
        alert("Hugging Face API'sine bağlanılıyor ve ürünler eşleştiriliyor...");
    }
</script>
</body>
</html>
<body>
<div class="container">
<h1>Ürün Arama Asistanı</h1>
<div class="button-group">
<button id="start-camera-btn" class="btn camera-btn">📷 Kamera</button>
<label for="gallery-upload" class="btn gallery-btn" style="text-align: center; line-height: normal; display: flex; align-items: center; justify-content: center;">🖼️ Galeri</label>
<input type="file" id="gallery-upload" accept="image/*" hidden>
</div>
<div id="camera-container" class="hidden">
<video id="webcam" autoplay playsinline></video>
<button id="capture-btn" class="btn" style="background-color: #5bc0de; margin-top: 10px;">📸 Çek</button>
</div>
<div id="preview-container">
<img id="image-preview" src="#" alt="Önizleme" class="hidden">
</div>
<canvas id="canvas" class="hidden"></canvas>
<button id="search-btn" class="btn action-btn" disabled>Afişi Bul</button>
<div id="result-section"></div>
</div>
<script>
// Arayüz mantığı buraya gelecek
</script>
</body>
</html>
