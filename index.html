<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ürün Arama Asistanı</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { background: #fff; padding: 15px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        button, label { padding: 12px; border-radius: 12px; border: none; background: #eef2ff; color: #4338ca; font-weight: bold; cursor: pointer; }
        #preview-container { margin: 15px 0; border-radius: 15px; overflow: hidden; background: #000; min-height: 200px; }
        video, img { width: 100%; display: block; }
        #scan-btn, #capture-btn { width: 100%; padding: 15px; border-radius: 12px; border: none; color: #fff; font-weight: bold; margin-top: 10px; }
        #capture-btn { background: #4f46e5; display: none; }
        #scan-btn { background: #059669; display: none; }
        #result-container { margin-top: 20px; border-top: 2px solid #eee; padding-top: 15px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Ürün Asistanı</h2>
    <div class="btn-group">
        <button id="camera-btn">📸 Fotoğraf Çek</button>
        <label for="file-input">🖼️ Galeriden Seç</label>
        <input type="file" id="file-input" accept="image/*" style="display:none">
    </div>
    <div id="preview-container"><video id="video" autoplay playsinline></video><img id="img-preview" style="display:none"></div>
    <button id="capture-btn">Çek</button>
    <button id="scan-btn">🔍 TARA VE BUL</button>
    <div id="status"></div>
    <div id="result-container">
        <h4>Eşleşen Afiş:</h4>
        <div id="telegram-result"></div>
    </div>
</div>

<script src="config.js"></script>
<script>
    const HF_API_URL = "https://deimnegric-bimkod.hf.space/vektor-uret";
    const FIREBASE_URL = "https://bimkod-ced21-default-rtdb.europe-west1.firebasedatabase.app/vektorler.json";
    
    const video = document.getElementById('video'), imgPrev = document.getElementById('img-preview');
    const scanBtn = document.getElementById('scan-btn'), captureBtn = document.getElementById('capture-btn');
    let selectedFile = null;

    document.getElementById('camera-btn').onclick = async () => {
        document.getElementById('preview-container').style.display = 'block';
        video.style.display = 'block'; imgPrev.style.display = 'none';
        captureBtn.style.display = 'block'; scanBtn.style.display = 'none';
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        video.srcObject = stream;
    };

    captureBtn.onclick = () => {
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        canvas.toBlob(blob => {
            selectedFile = new File([blob], "c.jpg");
            imgPrev.src = URL.createObjectURL(blob);
            imgPrev.style.display = 'block'; video.style.display = 'none';
            captureBtn.style.display = 'none'; scanBtn.style.display = 'block';
            video.srcObject.getTracks().forEach(t => t.stop());
        }, 'image/jpeg');
    };

    scanBtn.onclick = async () => {
        document.getElementById('status').innerHTML = "Analiz ediliyor...";
        const fd = new FormData(); fd.append("file", selectedFile);
        const res = await fetch(HF_API_URL, { method: "POST", body: fd });
        const data = await res.json();
        
        // Telegram resmini bot tokenı ile burada doğrudan çekiyoruz
        document.getElementById('result-container').style.display = 'block';
        document.getElementById('telegram-result').innerHTML = `
           <img src="https://api.telegram.org/file/bot${window.TOKEN}/${data.file_id}" style="width:100%; border-radius:10px">
           <p>Eşleşme sağlandı.</p>
        `;
        document.getElementById('status').innerHTML = "";
    };
</script>
</body>
</html>
