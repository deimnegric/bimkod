<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BİM Pro Arama</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <style>
        body { margin: 0; font-family: sans-serif; background: #f8f9fa; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
        .container { width: 100%; max-width: 500px; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        #image-container { max-width: 100%; height: 300px; margin: 20px 0; background: #eee; border-radius: 10px; overflow: hidden; }
        img { max-width: 100%; display: block; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn { padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; flex: 1; color: white; transition: 0.3s; }
        #camera-btn { background: #0d6efd; }
        #gallery-btn { background: #6c757d; }
        #scan-btn { background: #198754; display: none; width: 100%; padding: 15px; border-radius: 12px; border: none; color: white; font-weight: bold; }
        #result { margin-top: 20px; font-weight: bold; color: #333; }
    </style>
</head>
<body>

<div class="container">
    <h3>Ürün Arama Asistanı</h3>
    
    <input type="file" id="camera-input" accept="image/*" capture="environment" style="display:none">
    <input type="file" id="gallery-input" accept="image/*" style="display:none">
    
    <div class="btn-group">
        <button id="camera-btn" class="btn" onclick="document.getElementById('camera-input').click()">📸 Kamera</button>
        <button id="gallery-btn" class="btn" onclick="document.getElementById('gallery-input').click()">🖼️ Galeri</button>
    </div>

    <div id="image-container">
        <img id="image" src="" alt="Seçilen Ürün" style="display:none;">
    </div>

    <button id="scan-btn" class="btn">🔍 Kırp ve Ürünü Bul</button>
    <div id="result"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
<script>
    const image = document.getElementById('image');
    const scanBtn = document.getElementById('scan-btn');
    const resultDiv = document.getElementById('result');
    let cropper;

    // Ortak işlem fonksiyonu
    const handleFile = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            image.src = e.target.result;
            image.style.display = 'block';
            scanBtn.style.display = 'block';
            if (cropper) cropper.destroy();
            cropper = new Cropper(image, { viewMode: 1 });
        };
        reader.readAsDataURL(file);
    };

    document.getElementById('camera-input').onchange = handleFile;
    document.getElementById('gallery-input').onchange = handleFile;

    scanBtn.onclick = async () => {
        resultDiv.innerText = "🚀 İşleniyor...";
        cropper.getCroppedCanvas().toBlob(async (blob) => {
            const formData = new FormData();
            formData.append('file', blob);
            
            try {
                const res = await fetch("https://deimnegric-bimkod.hf.space/vektor-uret", {
                    method: "POST",
                    body: formData
                });
                const data = await res.json();
                
                if(data.vector) {
                    resultDiv.innerText = "✅ Vektör alındı! (Şimdi veritabanı eşleşmesi yapılacak)";
                    console.log("Vektör:", data.vector);
                } else {
                    resultDiv.innerText = "❌ Hata: " + JSON.stringify(data);
                }
            } catch (err) {
                resultDiv.innerText = "❌ Bağlantı hatası!";
            }
        });
    };
</script>
</body>
</html>
