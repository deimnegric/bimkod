<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kurumsal Ürün Arama</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
            border-top: 5px solid #d9534f;
            margin-top: 20px;
        }
        header h1 {
            color: #333333;
            margin-bottom: 20px;
            font-size: 24px;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }
        
        .upload-btn, .trigger-btn {
            flex: 1;
            display: inline-block;
            color: white;
            padding: 12px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            border: none;
            transition: background-color 0.3s;
        }
        .camera-btn { background-color: #0275d8; }
        .camera-btn:hover { background-color: #025aa5; }
        .gallery-btn { background-color: #d9534f; }
        .gallery-btn:hover { background-color: #c9302c; }

        #camera-container {
            margin-top: 15px;
            position: relative;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
        }
        #webcam {
            width: 100%;
            height: auto;
            display: block;
        }
        .capture-action-btn {
            background-color: #5bc0de;
            color: white;
            margin: 10px 0;
        }

        #preview-container {
            margin-top: 10px;
        }
        #preview-container img {
            max-width: 100%;
            max-height: 250px;
            object-fit: contain;
            border: 2px dashed #cccccc;
            padding: 5px;
            border-radius: 8px;
        }
        .preview-hidden { display: none; }
        
        .action-btn, .reset-btn {
            margin-top: 15px;
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            transition: background-color 0.3s;
        }
        .action-btn { background-color: #5cb85c; color: white; }
        .action-btn:hover:not(:disabled) { background-color: #4cae4c; }
        .action-btn:disabled { background-color: #cccccc; cursor: not-allowed; }
        .reset-btn { background-color: #333333; color: white; }
        .reset-btn:hover { background-color: #222222; }
        
        #ai-status-message { 
            margin-top: 15px; 
            font-weight: bold; 
            font-size: 15px;
        }
        .status-loading { color: #f0ad4e; font-style: italic; }
        .status-success { color: #5cb85c; }
        .status-error { color: #d9534f; }

        .hidden { display: none; }
        
        #result-section { margin-top: 30px; border-top: 2px solid #eeeeee; padding-top: 20px; }
        .gallery-title { font-size: 16px; font-weight: bold; color: #333; margin-bottom: 15px; }
        .gallery { display: flex; flex-direction: column; gap: 20px; }
        
        .result-card {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: left;
        }
        .result-info {
            padding: 15px;
            background: #f9f9f9;
        }
        .match-score {
            font-size: 16px;
            font-weight: bold;
            color: #5cb85c;
            margin-bottom: 8px;
        }
        .tg-link-btn {
            display: inline-block;
            background-color: #0088cc;
            color: white;
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        .tg-link-btn:hover {
            background-color: #006699;
        }
    </style>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>

<div class="container">
    <header>
        <h1>Ürün Arama Asistanı</h1>
    </header>
    <main>
        
        <div class="button-group">
            <button id="start-camera-btn" class="trigger-btn camera-btn">📷 Kamerayı Aç</button>
            <label for="gallery-upload" class="upload-btn gallery-btn" style="text-align: center;">🖼️ Galeriden Seç</label>
            <input type="file" id="gallery-upload" accept="image/*" hidden>
        </div>

        <div id="camera-container" class="hidden">
            <video id="webcam" autoplay playsinline></video>
            <button id="capture-btn" class="trigger-btn capture-action-btn">📸 Fotoğrafı Çek</button>
        </div>
        
        <div id="preview-container" class="preview-hidden">
            <img id="image-preview" src="#" alt="Aranacak Ürün">
        </div>
        
        <canvas id="canvas" class="hidden"></canvas>
        
        <div id="ai-status-message" class="hidden"></div>
        
        <button id="search-btn" class="action-btn" disabled>Benzer Afişleri Bul</button>
        
        <div id="result-section" class="hidden">
            <div class="gallery-title">En Yakın 5 Eşleşme (Telegram Arşivi):</div>
            <div id="gallery-container" class="gallery"></div>
        </div>
        
        <button id="reset-btn" class="reset-btn">Yeni Arama Yap</button>
    </main>
</div>

<script>
    // ⚙️ Sizin Canlı Firebase ve API Yapılandırmanız
    const firebaseConfig = {
        apiKey: "AIzaSyD0tg7k_iZmR0sR0cHRZkJpOprNr5gQnz8",
        databaseURL: "https://bimkod-ced21-default-rtdb.europe-west1.firebasedatabase.app"
    };
    
    // Firebase'i başlatıyoruz
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const API_URL = "https://deimnegric-bimkod.hf.space"; 

    let stream = null;
    let selectedFile = null; 
    let currentVector = null; 

    const video = document.getElementById('webcam');
    const canvas = document.getElementById('canvas');
    const previewImg = document.getElementById('image-preview');
    const previewContainer = document.getElementById('preview-container');
    const cameraContainer = document.getElementById('camera-container');
    const searchBtn = document.getElementById('search-btn');
    const aiStatus = document.getElementById('ai-status-message');

    function setStatus(text, className) {
        aiStatus.innerText = text;
        aiStatus.className = " " + className;
        aiStatus.classList.remove('hidden');
    }

    // İki vektör arasındaki Kosinüs Benzerliğini hesaplayan matematiksel motor
    function cosineSimilarity(vecA, vecB) {
        let dotProduct = 0.0;
        let normA = 0.0;
        let normB = 0.0;
        for (let i = 0; i < vecA.length; i++) {
            dotProduct += vecA[i] * vecB[i];
            normA += vecA[i] * vecA[i];
            normB += vecB[i] * vecB[i];
        }
        if (normA === 0 || normB === 0) return 0;
        return dotProduct / (Math.sqrt(normA) * Math.sqrt(normB));
    }

    document.getElementById('start-camera-btn').addEventListener('click', async function() {
        previewContainer.classList.add('preview-hidden');
        searchBtn.disabled = true;
        selectedFile = null;
        currentVector = null;
        aiStatus.classList.add('hidden');
        
        try {
            stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment" }, 
                audio: false 
            });
            video.srcObject = stream;
            cameraContainer.classList.remove('hidden');
        } catch (err) {
            setStatus("❌ Kamera izni alınamadı!", "status-error");
            console.error(err);
        }
    });

    document.getElementById('capture-btn').addEventListener('click', function() {
        if (stream) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            
            canvas.toBlob(function(blob) {
                selectedFile = blob;
                analizEtVeVektörUret();
            }, 'image/jpeg');

            const dataUrl = canvas.toDataURL('image/jpeg');
            previewImg.src = dataUrl;
            
            stream.getTracks().forEach(track => track.stop());
            cameraContainer.classList.add('hidden');
            previewContainer.classList.remove('preview-hidden');
        }
    });

    document.getElementById('gallery-upload').addEventListener('change', function(event) {
        if (stream) {
            stream.getTracks().forEach(track => track.stop());
            cameraContainer.classList.add('hidden');
        }

        const file = event.target.files[0];
        if (file) {
            selectedFile = file;
            currentVector = null;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                previewImg.src = e.target.result;
                previewContainer.classList.remove('preview-hidden');
                document.getElementById('result-section').classList.add('hidden');
                document.getElementById('gallery-container').innerHTML = '';
                analizEtVeVektörUret();
            };
            reader.readAsDataURL(file);
        }
    });

    async function analizEtVeVektörUret() {
        if (!selectedFile) return;

        setStatus("⏳ Görsel taranıyor...", "status-loading");
        searchBtn.disabled = true;

        const formData = new FormData();
        formData.append("file", selectedFile, "urun.jpg");

        try {
            const response = await fetch(`${API_URL}/vektor-uret`, {
                method: "POST",
                body: formData
            });

            const data = await response.json();

            if (data.status === "success") {
                currentVector = data.vector; 
                setStatus("✓ Görsel tarandı.", "status-success");
                searchBtn.disabled = false; 
            } else {
                setStatus("❌ Yapay zeka tarama hatası!", "status-error");
            }
        } catch (error) {
            setStatus("❌ Sunucu bağlantı hatası!", "status-error");
            console.error(error);
        }
    }

    // 🔍 "Benzer Afişleri Bul" butonuna basınca Firebase'de arama yapan fonksiyon
    searchBtn.addEventListener('click', function() {
        if (!currentVector) return;

        setStatus("🔍 Veritabanı arşivi taranıyor...", "status-loading");

        // Firebase'deki tüm afişleri tek seferde çekiyoruz
        database.ref('afisler').once('value').then((snapshot) => {
            const afisler = snapshot.val();
            if (!afisler) {
                setStatus("❌ Veritabanında henüz taranmış afiş bulunamadı!", "status-error");
                return;
            }

            let sonuclar = [];

            // Tüm afişleri tek tek dolaş ve benzerlik skoru hesapla
            for (let key in afisler) {
                const dbAfis = afisler[key];
                if (dbAfis.vector && Array.isArray(dbAfis.vector)) {
                    const skor = cosineSimilarity(currentVector, dbAfis.vector);
                    
                    sonuclar.push({
                        telegram_link: dbAfis.telegram_link,
                        skor: skor
                    });
                }
            }

            // Skorları en yüksekten en düşüğe sırala
            sonuclar.sort((a, b) => b.skor - a.skor);

            // En yakın ilk 5 sonucu al
            const enYakinBes = sonuclar.slice(0, 5);

            // Arayüzü temizle ve sonuçları bas
            const galleryContainer = document.getElementById('gallery-container');
            galleryContainer.innerHTML = '';

            enYakinBes.forEach((item) => {
                // Skoru yüzde formatına çevir (Örn: %92.4)
                const yuzdeSkor = (item.skor * 100).toFixed(1);

                const card = document.createElement('div');
                card.className = 'result-card';

                const infoElement = document.createElement('div');
                infoElement.className = 'result-info';
                
                infoElement.innerHTML = `
                    <div class="match-score">🎯 %${yuzdeSkor} Eşleşme</div>
                    <a href="${item.telegram_link}" target="_blank" class="tg-link-btn">✈️ Telegram'da Afişi Gör</a>
                `;

                card.appendChild(infoElement);
                galleryContainer.appendChild(card);
            });

            setStatus("✓ Arama tamamlandı!", "status-success");
            document.getElementById('result-section').classList.remove('hidden');

        }).catch((error) => {
            setStatus("❌ Veritabanından veri çekilemedi!", "status-error");
            console.error(error);
        });
    });

    document.getElementById('reset-btn').addEventListener('click', function() {
        location.reload();
    });
</script>

</body>
</html>
